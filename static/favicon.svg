<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- App icon background -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>

  <!-- Subtle map grid -->
  <line x1="4" y1="10.5" x2="28" y2="10.5" stroke="#1a2233" stroke-width="0.6"/>
  <line x1="4" y1="16"   x2="28" y2="16"   stroke="#1a2233" stroke-width="0.6"/>
  <line x1="4" y1="21.5" x2="28" y2="21.5" stroke="#1a2233" stroke-width="0.6"/>
  <line x1="10.5" y1="4" x2="10.5" y2="28" stroke="#1a2233" stroke-width="0.6"/>
  <line x1="16"   y1="4" x2="16"   y2="28" stroke="#1a2233" stroke-width="0.6"/>
  <line x1="21.5" y1="4" x2="21.5" y2="28" stroke="#1a2233" stroke-width="0.6"/>

  <!-- Location pin (red) -->
  <path d="M16 3.5 C12 3.5 9 6.5 9 10.5 C9 16.2 16 28.5 16 28.5 C16 28.5 23 16.2 23 10.5 C23 6.5 20 3.5 16 3.5Z"
        fill="#ef4444"/>

  <!-- Pin inner dark circle -->
  <circle cx="16" cy="10.5" r="4.2" fill="#0d1117"/>

  <!-- Flame — outer (orange) -->
  <path d="M16 7.2 C16 7.2 13.8 9.3 13.8 11.1 C13.8 12.6 14.7 13.5 16 13.5
           C17.3 13.5 18.2 12.6 18.2 11.1 C18.2 9.3 16 7.2 16 7.2Z"
        fill="#f97316"/>

  <!-- Flame — inner core (yellow) -->
  <path d="M16 9.0 C16 9.0 14.9 10.1 14.9 11.1 C14.9 12 15.4 12.5 16 12.5
           C16.6 12.5 17.1 12 17.1 11.1 C17.1 10.1 16 9.0 16 9.0Z"
        fill="#fbbf24"/>

  <!-- Outer glow ring (subtle) -->
  <circle cx="16" cy="10.5" r="7" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.35" stroke-dasharray="2.5 2"/>
</svg>
